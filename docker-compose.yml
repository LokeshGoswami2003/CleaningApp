services:
  postgres:
    image: postgres:16-alpine
    container_name: cleaning-app-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cleaning_app
      POSTGRES_PASSWORD: cleaning_app_password
      POSTGRES_DB: cleaning_app_dev
    ports:
      - "5432:5432"
    volumes:
      - cleaning_app_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cleaning_app -d cleaning_app_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cleaning_app_postgres_data:

